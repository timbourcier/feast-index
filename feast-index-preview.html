<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#E6E3DE" />
<title>The Feast Index</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
/* ═══════════════════════════════════════════════════════════════
   The Feast Index — design system
   Faithful to the mockups: brick-red accent, ivory page, white app
   surface, bold clean sans. The $/lb readout is the signature.
   ═══════════════════════════════════════════════════════════════ */

:root {
  --bg:        #E6E3DE;   /* page behind the app column */
  --surface:   #FFFFFF;   /* the app canvas */
  --inset:     #F3F1ED;   /* soft cards, input fields */
  --inset-2:   #ECE9E4;   /* pressed / secondary chips */
  --ink:       #1B1A18;   /* primary text */
  --ink-2:     #57544E;   /* secondary text */
  --muted:     #928C82;   /* tertiary / captions */
  --line:      #EAE7E1;   /* hairline dividers */

  --red:       #C2473B;   /* primary accent */
  --red-ink:   #A73A2F;   /* pressed accent */
  --red-tint:  #F4E0DC;   /* faint accent wash */
  --on-red:    #FBEDE9;   /* muted text on red */

  --gold:      #C79A2E;
  --gold-bg:   #EFE6C9;
  --silver:    #9A9AA0;
  --silver-bg: #E9E9EC;
  --bronze:    #B06B3A;
  --bronze-bg: #EEDFCF;
  --green:     #5E8A5B;
  --green-bg:  #DCE8D8;
  --blue:      #4B6EA8;
  --blue-bg:   #DCE3EF;

  --r-lg: 26px;
  --r-md: 18px;
  --r-sm: 13px;
  --pill: 999px;

  --shadow: 0 24px 60px -28px rgba(30, 22, 18, .45);
  --font: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body { height: 100%; }

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--ink);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  -webkit-tap-highlight-color: transparent;
  display: flex;
  justify-content: center;
}
button { -webkit-tap-highlight-color: transparent; }

/* App column: phone-like on mobile, centered card on desktop */
#app {
  width: 100%;
  max-width: 460px;
  min-height: 100vh;
  min-height: 100dvh;
  background: var(--surface);
  position: relative;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
/* Mobile is the base (full-bleed, edge to edge). On laptop/desktop the
   same column becomes a centered, comfortably-sized app card. */
@media (min-width: 520px) {
  body { padding: 24px 20px; align-items: center; }
  #app {
    min-height: 0;
    height: min(880px, calc(100vh - 48px));
    height: min(880px, calc(100dvh - 48px));
    max-width: 448px;
    border-radius: 34px;
    box-shadow: var(--shadow);
    overflow: hidden;
  }
}

/* Scrolling content region */
#main {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 26px 22px 22px;
  scrollbar-width: none;
}
#main::-webkit-scrollbar { display: none; }

/* ── Type ──────────────────────────────────────────────────────── */
h1 { font-size: 27px; font-weight: 800; letter-spacing: -.02em; line-height: 1.05; }
h2 { font-size: 17px; font-weight: 700; letter-spacing: -.01em; }
h3 { font-size: 15px; font-weight: 700; letter-spacing: -.01em; }
.eyebrow { font-size: 12.5px; font-weight: 600; color: var(--muted); }
.dim { color: var(--muted); }
.num { font-variant-numeric: tabular-nums; }

/* ── App header ────────────────────────────────────────────────── */
.app-head {
  display: flex; align-items: flex-start; justify-content: space-between;
  margin-bottom: 20px;
}
.wordmark { display: flex; align-items: center; gap: 6px; margin-top: 6px; }
.wordmark .by { font-size: 13px; color: var(--muted); font-weight: 500; }
.wordmark .mlogo { width: 17px; height: 17px; display: block; }
.wordmark .mword { font-size: 14px; color: var(--ink); font-weight: 700; letter-spacing: -.01em; }
.avatar {
  width: 44px; height: 44px; border-radius: var(--pill);
  background: var(--ink); color: #fff;
  display: grid; place-items: center;
  font-size: 14px; font-weight: 700; flex: none;
  cursor: pointer; border: none;
}

/* ── Hero: this week's top pick ────────────────────────────────── */
.hero {
  background: var(--red); color: #fff;
  border-radius: var(--r-lg); padding: 20px;
  display: flex; gap: 16px; align-items: center;
  margin-bottom: 14px;
}
.hero .glyph {
  width: 62px; height: 62px; border-radius: var(--r-md); flex: none;
  background: rgba(255,255,255,.16);
  display: grid; place-items: center;
}
.hero .glyph svg { width: 30px; height: 30px; stroke: #fff; }
.hero .glyph.photo { background: none; overflow: hidden; }
.hero .k { font-size: 13px; color: var(--on-red); font-weight: 600; }
.hero .v { font-size: 22px; font-weight: 800; letter-spacing: -.02em; margin: 3px 0 10px; }
.hero .pills { display: flex; gap: 8px; flex-wrap: wrap; }
.hero .pill {
  background: rgba(255,255,255,.18); color: #fff;
  padding: 5px 11px; border-radius: var(--pill);
  font-size: 12.5px; font-weight: 600;
}

/* ── Milestone ─────────────────────────────────────────────────── */
.milestone {
  background: var(--inset); border-radius: var(--r-lg);
  padding: 16px 18px; display: flex; align-items: center; gap: 14px;
  margin-bottom: 26px;
}
.milestone .glyph {
  width: 56px; height: 56px; border-radius: var(--r-md); flex: none;
  background: var(--gold-bg); display: grid; place-items: center;
}
.milestone .glyph svg { width: 26px; height: 26px; stroke: var(--gold); }
.milestone .body { flex: 1; }
.milestone .row { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 9px; }
.milestone .row b { font-size: 14.5px; font-weight: 700; }
.milestone .row .amt { font-size: 13px; color: var(--ink-2); font-weight: 600; }
.track { height: 9px; background: #DED9D1; border-radius: var(--pill); overflow: hidden; }
.track > i { display: block; height: 100%; background: var(--red); border-radius: var(--pill); transition: width .6s cubic-bezier(.2,.7,.2,1); }

/* ── Section label ─────────────────────────────────────────────── */
.section-label { margin: 0 0 13px; }

/* ── Podium (top 3) ────────────────────────────────────────────── */
.podium { display: grid; grid-template-columns: repeat(3,1fr); gap: 11px; margin-bottom: 22px; }
.podium .cell {
  background: var(--inset); border-radius: var(--r-md);
  padding: 16px 10px; text-align: center; cursor: pointer;
  border: 1px solid transparent; transition: border-color .15s, transform .15s;
}
.podium .cell:hover { transform: translateY(-2px); }
.podium .medal {
  width: 42px; height: 42px; border-radius: var(--pill); margin: 0 auto 10px;
  display: grid; place-items: center;
}
.podium .medal svg { width: 20px; height: 20px; }
.podium .m1 { background: var(--gold-bg); } .podium .m1 svg { stroke: var(--gold); }
.podium .m2 { background: var(--silver-bg); } .podium .m2 svg { stroke: var(--silver); }
.podium .m3 { background: var(--bronze-bg); } .podium .m3 svg { stroke: var(--bronze); }
.podium .nm { font-size: 13.5px; font-weight: 700; line-height: 1.2; margin-bottom: 3px; }
.podium .rt { font-size: 12.5px; color: var(--muted); font-weight: 600; }

/* ── Buttons ───────────────────────────────────────────────────── */
.btn {
  width: 100%; border: none; cursor: pointer; font-family: var(--font);
  background: var(--red); color: #fff;
  border-radius: var(--r-md); padding: 17px; font-size: 16px; font-weight: 700;
  display: flex; align-items: center; justify-content: center; gap: 9px;
  transition: background .15s, transform .05s;
}
.btn:hover { background: var(--red-ink); }
.btn:active { transform: scale(.99); }
.btn:disabled { background: #D9CFC9; color: #fff; cursor: not-allowed; }
.btn svg { width: 20px; height: 20px; }
.btn.ghost { background: var(--inset); color: var(--ink); }
.btn.ghost:hover { background: var(--inset-2); }

/* ── Bottom nav ────────────────────────────────────────────────── */
.tabbar {
  display: flex; border-top: 1px solid var(--line);
  padding: 10px 6px calc(10px + env(safe-area-inset-bottom));
  background: var(--surface); flex: none;
}
.tabbar button {
  flex: 1; background: none; border: none; cursor: pointer; font-family: var(--font);
  display: flex; flex-direction: column; align-items: center; gap: 5px;
  color: var(--muted); font-size: 11.5px; font-weight: 600; padding: 4px;
}
.tabbar button svg { width: 21px; height: 21px; }
.tabbar button.active { color: var(--red); }

/* ── Screen title row (Log / detail) ───────────────────────────── */
.titlebar { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; }
.iconbtn {
  width: 38px; height: 38px; border-radius: var(--pill); border: none; cursor: pointer;
  background: var(--inset); display: grid; place-items: center; flex: none;
}
.iconbtn:hover { background: var(--inset-2); }
.iconbtn svg { width: 20px; height: 20px; stroke: var(--ink); }

/* ── Form fields ───────────────────────────────────────────────── */
.field { margin-bottom: 18px; }
.field > label { display: block; font-size: 14px; font-weight: 600; color: var(--ink-2); margin-bottom: 9px; }
.field > label .optional { font-weight: 500; color: var(--muted); font-size: 12.5px; margin-left: 2px; }
.input-wrap { position: relative; display: flex; align-items: center; }
.input-wrap .pre {
  position: absolute; left: 15px; color: var(--muted);
  display: grid; place-items: center; pointer-events: none;
}
.input-wrap .pre svg { width: 18px; height: 18px; stroke: var(--muted); }
input.control, textarea.control {
  width: 100%; font-family: var(--font); font-size: 16px; font-weight: 500; color: var(--ink);
  background: var(--inset); border: 1.5px solid transparent; border-radius: var(--r-sm);
  padding: 15px 15px;
}
textarea.control { min-height: 74px; resize: vertical; line-height: 1.4; }
input.control.has-pre { padding-left: 42px; }
input.control::placeholder, textarea.control::placeholder { color: var(--muted); font-weight: 500; }
input.control:focus, textarea.control:focus { outline: none; border-color: var(--red); background: #fff; }
.two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 13px; }

/* photo upload (log screen) */
.photo-add {
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px;
  height: 108px; width: 100%; border-radius: var(--r-md); background: var(--inset);
  border: 1.5px dashed #D8D3CB; color: var(--ink-2); font-size: 13.5px; font-weight: 600; cursor: pointer;
}
.photo-add svg { width: 22px; height: 22px; stroke: var(--muted); }
.photo-preview-wrap { position: relative; width: 100%; height: 160px; border-radius: var(--r-md); overflow: hidden; }
.photo-preview-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }
.photo-remove {
  position: absolute; top: 8px; right: 8px; width: 30px; height: 30px; border-radius: var(--pill);
  background: rgba(27,26,24,.6); color: #fff; border: none; cursor: pointer;
  display: grid; place-items: center; font-size: 15px; line-height: 1;
}

/* photo lightbox (detail screen) */
.photo-lightbox {
  position: fixed; inset: 0; background: rgba(10,9,8,.9); z-index: 70;
  display: flex; align-items: center; justify-content: center; padding: 20px; animation: tipFade .15s ease;
}
.photo-lightbox img { max-width: 100%; max-height: 100%; border-radius: var(--r-md); display: block; }
.photo-lightbox .close {
  position: absolute; top: 18px; right: 18px; width: 38px; height: 38px; border-radius: var(--pill);
  background: rgba(255,255,255,.15); color: #fff; border: none; font-size: 18px; cursor: pointer;
}

/* matched / new place card */
.place-strip {
  display: flex; align-items: center; gap: 13px;
  background: var(--inset); border-radius: var(--r-md); padding: 14px; margin-bottom: 18px;
}
.place-strip .thumb { width: 48px; height: 48px; border-radius: 13px; background: var(--red-tint); flex: none; display: grid; place-items: center; font-size: 22px; }
.place-strip .nm { font-size: 16px; font-weight: 700; }
.place-strip .sub { font-size: 13px; color: var(--muted); margin-top: 2px; }

/* name picker */
.people { display: flex; gap: 9px; flex-wrap: wrap; }
.person {
  display: flex; align-items: center; gap: 8px; cursor: pointer;
  background: var(--inset); border: 1.5px solid transparent; border-radius: var(--pill);
  padding: 7px 15px 7px 7px; font-family: var(--font); font-size: 15px; font-weight: 600; color: var(--ink-2);
}
.person .ini {
  width: 30px; height: 30px; border-radius: var(--pill); background: var(--inset-2);
  display: grid; place-items: center; font-size: 12px; font-weight: 700; color: var(--ink-2);
}
.person.on { background: var(--ink); color: #fff; border-color: var(--ink); }
.person.on .ini { background: var(--red); color: #fff; }

/* tag chips */
.chips { display: flex; gap: 8px; flex-wrap: wrap; }
.chip {
  cursor: pointer; font-family: var(--font); font-size: 13.5px; font-weight: 600;
  background: var(--inset); color: var(--ink-2); border: 1.5px solid transparent;
  border-radius: var(--pill); padding: 8px 14px;
}
.chip.on { background: var(--red); color: #fff; border-color: var(--red); }
.chip.readonly { cursor: default; background: var(--inset); color: var(--ink-2); }

/* live ratio readout — the signature element */
.readout {
  background: var(--inset); border-radius: var(--r-md);
  padding: 18px; text-align: center; margin-bottom: 20px;
}
.readout .k { font-size: 13px; color: var(--muted); font-weight: 600; }
.readout .v {
  font-size: 40px; font-weight: 800; letter-spacing: -.03em; margin-top: 4px;
  font-variant-numeric: tabular-nums;
}
.readout .v small { font-size: 18px; font-weight: 700; color: var(--muted); margin-left: 4px; letter-spacing: 0; }
.readout .grade { display: inline-block; margin-top: 8px; }

/* grade badge */
.gbadge {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 12.5px; font-weight: 700; border-radius: var(--pill);
  padding: 4px 11px; background: var(--gold-bg); color: var(--gold);
}
.gbadge.g-s { background: var(--gold-bg);   color: var(--gold); }
.gbadge.g-a { background: var(--green-bg);  color: var(--green); }
.gbadge.g-b { background: var(--blue-bg);   color: var(--blue); }
.gbadge.g-c { background: var(--bronze-bg); color: var(--bronze); }
.gbadge.g-d { background: var(--inset-2);   color: var(--muted); }

/* thumbnails that hold a real photo instead of an emoji */
.thumb img, .glyph img { width: 100%; height: 100%; object-fit: cover; border-radius: inherit; display: block; }

/* ── Library ───────────────────────────────────────────────────── */
.filterbar { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px; margin-bottom: 16px; scrollbar-width: none; }
.filterbar::-webkit-scrollbar { display: none; }
.filterbar .chip { flex: none; }
.sortrow { display: flex; gap: 8px; margin-bottom: 16px; }
.seg {
  flex: 1; cursor: pointer; font-family: var(--font); font-size: 13px; font-weight: 600;
  background: var(--inset); color: var(--ink-2); border: none; border-radius: var(--r-sm); padding: 10px;
}
.seg.on { background: var(--ink); color: #fff; }

.place-card {
  display: flex; align-items: center; gap: 14px; cursor: pointer;
  padding: 15px 4px; border-bottom: 1px solid var(--line);
}
.place-card:last-child { border-bottom: none; }
.place-card .rank { width: 24px; text-align: center; font-size: 14px; font-weight: 700; color: var(--muted); flex: none; font-variant-numeric: tabular-nums; }
.place-card .thumb { width: 46px; height: 46px; border-radius: 13px; background: var(--red-tint); flex: none; display: grid; place-items: center; font-size: 21px; overflow: hidden; }
.place-card .body { flex: 1; min-width: 0; }
.place-card .nm { font-size: 15.5px; font-weight: 700; }
.place-card .meta { font-size: 12.5px; color: var(--muted); margin-top: 3px; display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
.place-card .dot { width: 3px; height: 3px; border-radius: 50%; background: var(--muted); }
.place-card .ratio { text-align: right; flex: none; }
.place-card .ratio b { font-size: 17px; font-weight: 800; font-variant-numeric: tabular-nums; }
.place-card .ratio span { display: block; font-size: 11px; color: var(--muted); font-weight: 600; }

/* top-3 get a bigger, tinted treatment so the ranking actually reads as a ranking */
.place-card.top {
  border-radius: var(--r-md); border-bottom: none; margin-bottom: 9px; padding: 13px 13px;
}
.place-card.top.t-gold   { background: var(--gold-bg); }
.place-card.top.t-silver { background: var(--silver-bg); }
.place-card.top.t-bronze { background: var(--bronze-bg); }
.place-card.top .rank {
  width: 34px; height: 34px; border-radius: 50%; background: rgba(255,255,255,.55);
  display: grid; place-items: center;
}
.place-card.top .rank svg { width: 17px; height: 17px; }
.place-card.top.t-gold   .rank svg { stroke: var(--gold); }
.place-card.top.t-silver .rank svg { stroke: var(--silver); }
.place-card.top.t-bronze .rank svg { stroke: var(--bronze); }
.place-card.top .thumb { width: 56px; height: 56px; border-radius: 15px; font-size: 24px; }
.place-card.top .nm { font-size: 16.5px; }

/* ── Detail ────────────────────────────────────────────────────── */
.detail-hero { text-align: center; margin-bottom: 22px; }
.detail-hero .thumb { width: 68px; height: 68px; border-radius: 20px; background: var(--red-tint); margin: 0 auto 14px; display: grid; place-items: center; font-size: 32px; overflow: hidden; }
.detail-hero h1 { margin-bottom: 8px; }
.detail-hero .taglist { display: flex; gap: 7px; justify-content: center; flex-wrap: wrap; margin-bottom: 14px; }
.detail-hero .biglink { font-size: 13px; color: var(--red); font-weight: 600; text-decoration: none; }

.statgrid { display: grid; grid-template-columns: repeat(3,1fr); gap: 11px; margin-bottom: 24px; }
.statgrid .cell { background: var(--inset); border-radius: var(--r-md); padding: 15px 8px; text-align: center; }
.statgrid .v { font-size: 21px; font-weight: 800; font-variant-numeric: tabular-nums; letter-spacing: -.02em; }
.statgrid .v .gbadge { font-size: 15px; padding: 4px 13px; }
.statgrid .k { font-size: 11.5px; color: var(--muted); font-weight: 600; margin-top: 4px; }

.stars { display: flex; gap: 6px; justify-content: center; margin: 6px 0 4px; }
.stars button { background: none; border: none; cursor: pointer; padding: 2px; }
.stars svg { width: 30px; height: 30px; }
.stars .on svg { fill: var(--gold); stroke: var(--gold); }
.stars .off svg { fill: none; stroke: #D2CCC3; }

.order-row { display: flex; align-items: center; gap: 12px; padding: 13px 2px; border-bottom: 1px solid var(--line); }
.order-row:last-child { border-bottom: none; }
.order-row .ini { width: 34px; height: 34px; border-radius: var(--pill); background: var(--inset-2); display: grid; place-items: center; font-size: 12px; font-weight: 700; color: var(--ink-2); flex: none; }
.order-row .body { flex: 1; min-width: 0; }
.order-row .body b { font-size: 14px; font-weight: 600; }
.order-row .body .sub { font-size: 12px; color: var(--muted); margin-top: 2px; }
.order-row .note { font-size: 12.5px; color: var(--ink-2); margin-top: 4px; line-height: 1.4; }
.order-row .r { font-size: 14px; font-weight: 800; font-variant-numeric: tabular-nums; flex: none; }
.order-row .thumb-btn {
  width: 42px; height: 42px; border-radius: 11px; overflow: hidden; flex: none;
  border: none; padding: 0; cursor: pointer; background: var(--inset-2);
}
.order-row .thumb-btn img { width: 100%; height: 100%; object-fit: cover; display: block; }

/* ── Stats screen ──────────────────────────────────────────────── */
.bigstat { background: var(--red); color: #fff; border-radius: var(--r-lg); padding: 22px; margin-bottom: 14px; text-align: center; }
.bigstat .v { font-size: 46px; font-weight: 800; letter-spacing: -.03em; font-variant-numeric: tabular-nums; }
.bigstat .v small { font-size: 20px; color: var(--on-red); margin-left: 5px; }
.bigstat .k { font-size: 13px; color: var(--on-red); font-weight: 600; margin-top: 2px; }
.duo { display: grid; grid-template-columns: 1fr 1fr; gap: 13px; margin-bottom: 24px; }
.duo .cell { background: var(--inset); border-radius: var(--r-md); padding: 18px; text-align: center; }
.duo .v { font-size: 26px; font-weight: 800; font-variant-numeric: tabular-nums; letter-spacing: -.02em; }
.duo .k { font-size: 12.5px; color: var(--muted); font-weight: 600; margin-top: 3px; }

.rangebar { display: flex; gap: 8px; margin-bottom: 18px; }
.rangebar .seg { font-size: 12px; padding: 9px 4px; }

.quad { display: grid; grid-template-columns: 1fr 1fr; gap: 13px; margin-bottom: 24px; }
.quad .cell { background: var(--inset); border-radius: var(--r-md); padding: 16px; text-align: center; }
.quad .v { font-size: 22px; font-weight: 800; font-variant-numeric: tabular-nums; letter-spacing: -.02em; }
.quad .k { font-size: 12px; color: var(--muted); font-weight: 600; margin-top: 3px; }

.chart { background: var(--inset); border-radius: var(--r-md); padding: 14px 10px 6px; margin-bottom: 22px; overflow-x: auto; }
.chart svg { display: block; }

.tagbar-row { margin-bottom: 12px; }
.tagbar-row:last-child { margin-bottom: 0; }
.tagbar-row .lbl { display: flex; justify-content: space-between; font-size: 13px; font-weight: 600; margin-bottom: 6px; }
.tagbar-row .lbl span:last-child { color: var(--muted); font-weight: 600; font-variant-numeric: tabular-nums; }
.tagbar-track { height: 8px; background: #DED9D1; border-radius: var(--pill); overflow: hidden; }
.tagbar-track > i { display: block; height: 100%; background: var(--red); border-radius: var(--pill); }

.lead-row { display: flex; align-items: center; gap: 13px; padding: 14px 2px; border-bottom: 1px solid var(--line); }
.lead-row:last-child { border-bottom: none; }
.lead-row .ini { width: 38px; height: 38px; border-radius: var(--pill); background: var(--ink); color: #fff; display: grid; place-items: center; font-size: 13px; font-weight: 700; flex: none; }
.lead-row .body { flex: 1; }
.lead-row .body b { font-size: 15px; font-weight: 700; }
.lead-row .body .sub { font-size: 12.5px; color: var(--muted); margin-top: 2px; }
.lead-row .amt { text-align: right; }
.lead-row .amt b { font-size: 16px; font-weight: 800; font-variant-numeric: tabular-nums; }
.lead-row .amt span { display: block; font-size: 11px; color: var(--muted); font-weight: 600; }

/* ── Profile ───────────────────────────────────────────────────── */
.profile-head { text-align: center; margin-bottom: 26px; }
.profile-head .big { width: 78px; height: 78px; border-radius: var(--pill); background: var(--ink); color: #fff; display: grid; place-items: center; font-size: 26px; font-weight: 800; margin: 0 auto 14px; }
.profile-head h1 { margin-bottom: 4px; }

.row-between { display: flex; align-items: center; justify-content: space-between; margin-bottom: 13px; }

/* ── Badges ────────────────────────────────────────────────────── */
.badges { display: grid; grid-template-columns: repeat(3, 1fr); gap: 11px; }
.badge { background: var(--inset); border-radius: var(--r-md); padding: 15px 8px 13px; text-align: center; }
.badge .ic {
  width: 46px; height: 46px; border-radius: var(--pill); margin: 0 auto 9px;
  display: grid; place-items: center; background: var(--inset-2); color: #C0B9AE;
}
.badge .ic svg { width: 23px; height: 23px; stroke: currentColor; fill: none; }
.badge .bn { font-size: 12.5px; font-weight: 700; line-height: 1.15; }
.badge .bs { font-size: 11px; font-weight: 600; color: var(--muted); margin-top: 3px; }
.badge.locked { opacity: .82; }
.badge.earned.gold   .ic { background: var(--gold-bg);   color: var(--gold); }
.badge.earned.silver .ic { background: var(--silver-bg); color: var(--silver); }
.badge.earned.bronze .ic { background: var(--bronze-bg); color: var(--bronze); }
.badge.earned.red    .ic { background: var(--red-tint);  color: var(--red); }
.badge.earned .bs { color: var(--ink-2); }
.badge .btrack { height: 5px; background: #DED9D1; border-radius: var(--pill); overflow: hidden; margin-top: 9px; }
.badge .btrack > i { display: block; height: 100%; background: var(--muted); border-radius: var(--pill); }

/* ── Create profile ────────────────────────────────────────────── */
.person.newp { background: #fff; border: 1.5px dashed #D8D3CB; color: var(--ink-2); }
.person.newp .ini { background: var(--inset); color: var(--ink-2); font-weight: 700; }
.create { background: var(--inset); border-radius: var(--r-md); padding: 16px; margin-top: 14px; }
.swatches { display: flex; gap: 11px; margin: 11px 0 16px; }
.swatch { width: 34px; height: 34px; border-radius: var(--pill); cursor: pointer; border: 3px solid transparent; padding: 0; }
.swatch.on { border-color: var(--ink); }

/* ── Small grade pill (podium + library) ───────────────────────── */
.gbadge.sm { font-size: 11px; padding: 2px 9px; }
.place-card .ratio { display: flex; flex-direction: column; align-items: flex-end; gap: 3px; }

/* ── Empty state ───────────────────────────────────────────────── */
.empty { text-align: center; padding: 50px 20px; }
.empty .glyph { width: 64px; height: 64px; border-radius: 20px; background: var(--inset); display: grid; place-items: center; margin: 0 auto 18px; }
.empty .glyph svg { width: 30px; height: 30px; stroke: var(--muted); }
.empty h3 { margin-bottom: 6px; }
.empty p { font-size: 14px; color: var(--muted); line-height: 1.5; max-width: 260px; margin: 0 auto; }

/* ── Toast ─────────────────────────────────────────────────────── */
#toast {
  position: fixed; left: 50%; bottom: 26px; transform: translateX(-50%) translateY(20px);
  background: var(--ink); color: #fff; padding: 13px 20px; border-radius: var(--pill);
  font-size: 14px; font-weight: 600; opacity: 0; pointer-events: none;
  transition: opacity .25s, transform .25s; z-index: 50; box-shadow: var(--shadow);
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* demo badge */
.demo-flag {
  font-size: 11px; font-weight: 700; color: var(--red); background: var(--red-tint);
  padding: 3px 9px; border-radius: var(--pill); letter-spacing: .02em;
}

.section-gap { margin-top: 28px; }

/* ── "Before you log" tip ──────────────────────────────────────── */
.tip-link {
  display: inline-flex; align-items: center; gap: 6px;
  background: none; border: none; cursor: pointer; font-family: var(--font);
  font-size: 13px; font-weight: 600; color: var(--ink-2);
  padding: 2px 0; margin: -4px 0 20px;
}
.tip-link svg { width: 15px; height: 15px; stroke: var(--muted); flex: none; }
.tip-link:hover { color: var(--ink); }
.tip-overlay {
  position: fixed; inset: 0; background: rgba(27,26,24,.55);
  display: flex; align-items: flex-end; justify-content: center;
  z-index: 60; padding: 0; animation: tipFade .15s ease;
}
@media (min-width: 520px) { .tip-overlay { align-items: center; padding: 20px; } }
@keyframes tipFade { from { opacity: 0; } to { opacity: 1; } }
.tip-sheet {
  background: var(--surface); border-radius: 26px 26px 0 0;
  padding: 26px 22px calc(22px + env(safe-area-inset-bottom));
  width: 100%; max-width: 460px;
}
@media (min-width: 520px) { .tip-sheet { border-radius: var(--r-lg); box-shadow: var(--shadow); } }
.tip-sheet .glyph {
  width: 52px; height: 52px; border-radius: var(--r-md); background: var(--red-tint);
  display: grid; place-items: center; margin-bottom: 16px;
}
.tip-sheet .glyph svg { width: 24px; height: 24px; stroke: var(--red); }
.tip-sheet h2 { margin-bottom: 16px; }
.tip-item { display: flex; gap: 12px; margin-bottom: 16px; }
.tip-item .n {
  width: 24px; height: 24px; border-radius: var(--pill); background: var(--inset);
  color: var(--ink-2); font-size: 12px; font-weight: 700; flex: none;
  display: grid; place-items: center; margin-top: 1px;
}
.tip-item p { font-size: 14px; line-height: 1.45; color: var(--ink-2); }
.tip-item p b { color: var(--ink); }
.tip-sheet .btn { margin-top: 6px; }

/* Very narrow phones */
@media (max-width: 360px) {
  #main { padding: 22px 16px 18px; }
  h1 { font-size: 24px; }
  .podium .cell { padding: 14px 6px; }
  .readout .v { font-size: 36px; }
}

@media (prefers-reduced-motion: reduce) {
  * { transition: none !important; }
}

</style>
</head>

function storeSlug(u) {
  if (!u) return "";
  const m = String(u).match(/store\/([^/?#]+)/i);
  let s = m ? m[1] : String(u).trim().split(/[/?#]/).pop();
  return s.toLowerCase().replace(/-[a-f0-9]{6,}$/, "").replace(/-\d+$/, "");
}

function gradeFor(costPerLbRatio) {
  if (!(costPerLbRatio > 0)) return null;
  return (CONFIG.GRADES.find((g) => costPerLbRatio <= g.max) || CONFIG.GRADES[CONFIG.GRADES.length - 1]).label;
}
function gradeClass(label) {
  if (!label) return "";
  if (label === "S") return "g-s";
  if (label.startsWith("A")) return "g-a";
  if (label === "B") return "g-b";
  if (label === "C") return "g-c";
  return "g-d";
}

/* ── Per-person aggregation (for badges & profile) ────────────── */
function personAgg(name, data) {
  const os = data.orders.filter((o) => o.person_name === name);
  const totalW = os.reduce((s, o) => s + Number(o.weight_lbs), 0);
  const totalP = os.reduce((s, o) => s + Number(o.price), 0);
  const places = new Set(os.map((o) => o.place_id));
  let founded = 0;
  for (const pid of places) {
    const po = data.orders.filter((o) => o.place_id === pid).sort((a, b) => new Date(a.ordered_at) - new Date(b.ordered_at));
    if (po[0] && po[0].person_name === name) founded++;
  }
  const ratings = data.ratings.filter((r) => r.person_name === name).length;
  const bestRatio = os.reduce((m, o) => {
    const w = Number(o.weight_lbs), p = Number(o.price);
    return Math.min(m, w > 0 ? p / w : Infinity);
  }, Infinity);
  return { orderCount: os.length, totalW, totalP, places: places.size, founded, ratings, bestRatio };
}

function weightRankOf(name, data) {
  const by = {};
  for (const o of data.orders) by[o.person_name] = (by[o.person_name] || 0) + Number(o.weight_lbs);
  const sorted = Object.entries(by).sort((a, b) => b[1] - a[1]).map((x) => x[0]);
  const i = sorted.indexOf(name);
  return i < 0 ? null : i + 1;
}

function evalBadge(b, agg, ctx) {
  if (b.rank) { const r = ctx.rank; return { earned: r === 1, sub: r ? "#" + r + " on team" : "—", pct: 0 }; }
  const { cur, goal, display } = b.calc(agg);
  const earned = cur >= goal;
  const pct = Math.min(100, (cur / goal) * 100);
  const sub = earned ? "Earned" : (display != null ? display : cur + " / " + goal);
  return { earned, sub, pct };
}

async function makeSupabaseDB() {
  const { createClient } = await import("https://esm.sh/@supabase/supabase-js@2");
  const sb = createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);
  return {
    live: true,
    async getData() {
      const [p, o, r, pe] = await Promise.all([
        sb.from("places").select("*"),
        sb.from("orders").select("*"),
        sb.from("ratings").select("*"),
        sb.from("people").select("*"),
      ]);
      for (const res of [p, o, r, pe]) if (res.error) throw res.error;
      let people = pe.data;
      if (!people.length) {
        const seed = CONFIG.TEAM.map((m, i) => ({ name: m.name, accent: m.accent || ACCENTS[i % ACCENTS.length] }));
        const { data: seeded, error } = await sb.from("people").insert(seed).select();
        if (error) throw error;
        people = seeded;
      }
      return { places: p.data, orders: o.data, ratings: r.data, people };
    },
    async addPerson({ name, accent }) { const { data, error } = await sb.from("people").insert({ name, accent }).select().single(); if (error) throw error; return data; },
    async addPlace(p) { const { data, error } = await sb.from("places").insert(p).select().single(); if (error) throw error; return data; },
    async addOrder(o) { const { data, error } = await sb.from("orders").insert(o).select().single(); if (error) throw error; return data; },
    async upsertRating(r) { const { data, error } = await sb.from("ratings").upsert(r, { onConflict: "place_id,person_name" }).select().single(); if (error) throw error; return data; },
  };
}

/* ── Aggregation ──────────────────────────────────────────────── */
function computeStats(place, orders, ratings) {
  const os = orders.filter((o) => o.place_id === place.id);
  const rs = ratings.filter((r) => r.place_id === place.id);
  const totalW = os.reduce((s, o) => s + Number(o.weight_lbs), 0);
  const totalP = os.reduce((s, o) => s + Number(o.price), 0);
  const ratio = totalW > 0 ? totalP / totalW : 0;
  const avg = rs.length ? rs.reduce((s, r) => s + r.score, 0) / rs.length : 0;
  return { orders: os, ratings: rs, totalW, totalP, ratio, orderCount: os.length, avgRating: avg, ratingCount: rs.length };
}

function rankedPlaces(data) {
  return data.places
    .map((p) => ({ place: p, s: computeStats(p, data.orders, data.ratings) }))
    .filter((x) => x.s.orderCount > 0)
    .sort((a, b) => a.s.ratio - b.s.ratio);
}

/* Most recent order photo logged for a place — used as its "cover" image. */
function placeCoverPhoto(placeId, orders) {
  const withPhotos = orders.filter((o) => o.place_id === placeId && o.photo)
    .sort((a, b) => new Date(b.ordered_at) - new Date(a.ordered_at));
  return withPhotos[0]?.photo || null;
}

/* ── Time ranges (Stats screen) ───────────────────────────────── */
const RANGE_DAYS = { "7d": 7, "30d": 30, "90d": 90, all: null };
const RANGE_LABEL = { "7d": "7 days", "30d": "30 days", "90d": "90 days", all: "All time" };
const RANGE_PERIOD_LABEL = { "7d": "this week", "30d": "this month", "90d": "these 90 days", all: "all time" };
function filterByRange(orders, range) {
  const days = RANGE_DAYS[range];
  if (!days) return orders;
  const cutoff = Date.now() - days * 864e5;
  return orders.filter((o) => new Date(o.ordered_at).getTime() >= cutoff);
}
function buildWeeklyBuckets(orders, range) {
  if (!orders.length) return [];
  const weekMs = 7 * 864e5;
  const count = range === "7d" ? 1 : range === "30d" ? 5 : range === "90d" ? 13 : 12;
  const now = Date.now();
  const buckets = [];
  for (let i = count - 1; i >= 0; i--) {
    const end = now - i * weekMs, start = end - weekMs;
    const lbs = orders.reduce((s, o) => {
      const t = new Date(o.ordered_at).getTime();
      return t > start && t <= end ? s + Number(o.weight_lbs) : s;
    }, 0);
    const label = new Date(start).toLocaleDateString(undefined, { month: "numeric", day: "numeric" });
    buckets.push({ lbs, label });
  }
  return buckets;
}
function chartSVG(weeks) {
  const max = Math.max(...weeks.map((w) => w.lbs), 1);
  const barW = 40, gap = 12, h = 128, baseline = h - 22;
  const totalW = weeks.length * (barW + gap) - gap;
  const bars = weeks.map((wk, i) => {
    const barH = wk.lbs > 0 ? Math.max(5, (wk.lbs / max) * (baseline - 20)) : 0;
    const x = i * (barW + gap), y = baseline - barH;
    return `
      <rect x="${x}" y="${y}" width="${barW}" height="${barH}" rx="7" fill="var(--red)" opacity="${wk.lbs > 0 ? 1 : 0.15}"/>
      ${wk.lbs > 0 ? `<text x="${x + barW / 2}" y="${y - 7}" text-anchor="middle" font-size="10.5" font-weight="700" fill="var(--ink)" font-family="var(--font)">${wk.lbs.toFixed(0)}</text>` : ""}
      <text x="${x + barW / 2}" y="${h - 4}" text-anchor="middle" font-size="10.5" fill="var(--muted)" font-family="var(--font)">${esc(wk.label)}</text>`;
  }).join("");
  return `<svg viewBox="0 0 ${totalW} ${h}" style="width:${Math.max(totalW, 260)}px;height:${h}px">${bars}</svg>`;
}
function tagBar(tag, w, max) {
  const pct = max > 0 ? Math.min(100, (w / max) * 100) : 0;
  return `<div class="tagbar-row"><div class="lbl"><span>${esc(tagLabel(tag))}</span><span>${w.toFixed(1)} lb</span></div><div class="tagbar-track"><i style="width:${pct}%"></i></div></div>`;
}

/* ── Photo helpers (Log screen) ───────────────────────────────── */
function resizeImage(file) {
  const maxDim = CONFIG.PHOTO_MAX_DIMENSION || 1000;
  const quality = CONFIG.PHOTO_QUALITY || 0.72;
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onerror = () => reject(new Error("Couldn't read that file"));
    reader.onload = (e) => {
      const img = new Image();
      img.onerror = () => reject(new Error("Couldn't read that image"));
      img.onload = () => {
        let { width, height } = img;
        if (width > height && width > maxDim) { height = Math.round(height * maxDim / width); width = maxDim; }
        else if (height > maxDim) { width = Math.round(width * maxDim / height); height = maxDim; }
        const canvas = document.createElement("canvas");
        canvas.width = width; canvas.height = height;
        canvas.getContext("2d").drawImage(img, 0, 0, width, height);
        resolve(canvas.toDataURL("image/jpeg", quality));
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

      ${place.doordash_url ? `<a class="biglink" href="${esc(place.doordash_url)}" target="_blank" rel="noopener">Open on DoorDash ↗</a>` : ""}
    </div>
    <div class="statgrid">
      <div class="cell"><div class="v num">${s.ratio > 0 ? "$" + s.ratio.toFixed(2) : "—"}</div><div class="k">$ per lb</div></div>
      <div class="cell"><div class="v">${grade ? `<span class="gbadge ${gradeClass(grade)}">${grade}</span>` : "—"}</div><div class="k">grade</div></div>
      <div class="cell"><div class="v num">${s.orderCount}</div><div class="k">orders</div></div>
    </div>
    <h3 class="section-label">Rate this place</h3>
    <div class="stars" id="stars">
      ${[1, 2, 3, 4, 5].map((n) => `<button class="${n <= myRating ? "on" : "off"}" data-score="${n}">${I.star}</button>`).join("")}
    </div>
    <p class="dim" style="text-align:center;font-size:12.5px">${s.ratingCount ? `Team average ${s.avgRating.toFixed(1)} · ${s.ratingCount} rating${s.ratingCount === 1 ? "" : "s"}` : "Be the first to rate it"}</p>
    <h3 class="section-label section-gap">Order history</h3>
    <div>${orders.map((o) => {
      const r = Number(o.weight_lbs) > 0 ? Number(o.price) / Number(o.weight_lbs) : 0;
      return `<div class="order-row">
        <div class="ini">${esc(initials(o.person_name))}</div>
        <div class="body">
          <b>${esc(o.person_name)}</b>
          <div class="sub">${money(o.price)} · ${Number(o.weight_lbs).toFixed(1)} lb · ${relTime(o.ordered_at)}</div>
          ${o.note ? `<div class="note">${esc(o.note)}</div>` : ""}
        </div>
        ${o.photo ? `<button class="thumb-btn" data-photo="${o.photo}"><img src="${o.photo}" alt="Order photo"/></button>` : ""}
        <div class="r num">${r > 0 ? "$" + r.toFixed(2) : "—"}</div>
      </div>`;
    }).join("")}</div>`;

  $("#back", main).onclick = () => go(tab === "detail" ? "library" : tab);
  main.querySelectorAll("[data-score]").forEach((b) => b.onclick = async () => {
    const score = Number(b.dataset.score);
    main.querySelectorAll("#stars button").forEach((x) => { const on = Number(x.dataset.score) <= score; x.className = on ? "on" : "off"; });
    try { await DB.upsertRating({ place_id: place.id, person_name: currentUser, score }); await refresh(); toast(`Rated ${place.name} ${score}★`); screenDetail(); }
    catch (e) { console.error(e); toast("Couldn't save rating"); }
  });
  main.querySelectorAll("[data-photo]").forEach((b) => b.onclick = () => openLightbox(b.dataset.photo));
}

function openLightbox(src) {
  const el = document.createElement("div");
  el.className = "photo-lightbox";
  el.innerHTML = `<button class="close">${I.close}</button><img src="${src}" alt="Order photo"/>`;
  el.onclick = (e) => { if (e.target === el || e.target.closest(".close")) el.remove(); };
  document.body.appendChild(el);
}

function screenStats() {
  const orders = filterByRange(DATA.orders, statsUI.range);
  const totalW = orders.reduce((s, o) => s + Number(o.weight_lbs), 0);
  const totalP = orders.reduce((s, o) => s + Number(o.price), 0);
  const overall = totalW > 0 ? totalP / totalW : 0;
  const placesTried = new Set(orders.map((o) => o.place_id)).size;

  const byPerson = {};
  for (const o of orders) {
    const k = o.person_name; byPerson[k] = byPerson[k] || { w: 0, p: 0, n: 0 };
    byPerson[k].w += Number(o.weight_lbs); byPerson[k].p += Number(o.price); byPerson[k].n += 1;
  }
  const leaders = Object.entries(byPerson).map(([name, v]) => ({ name, ...v, ratio: v.w > 0 ? v.p / v.w : 0 }))
    .sort((a, b) => b.w - a.w);

  const byTag = {};
  for (const o of orders) {
    const place = DATA.places.find((p) => p.id === o.place_id);
    (place?.tags || []).forEach((t) => { byTag[t] = (byTag[t] || 0) + Number(o.weight_lbs); });
  }
  const topTags = Object.entries(byTag).sort((a, b) => b[1] - a[1]).slice(0, 5);
  const maxTag = topTags[0]?.[1] || 0;

  const ranked = rankedPlaces({ places: DATA.places, orders, ratings: DATA.ratings });
  const bestValue = ranked[0];
  const weeks = buildWeeklyBuckets(orders, statsUI.range);

  main.innerHTML = `
    <div class="app-head"><h1>Stats</h1></div>
    <div class="rangebar">
      ${Object.keys(RANGE_LABEL).map((r) => `<button class="seg ${statsUI.range === r ? "on" : ""}" data-range="${r}">${RANGE_LABEL[r]}</button>`).join("")}
    </div>
    <div class="bigstat"><div class="v num">${totalW.toFixed(0)}<small>lbs</small></div><div class="k">total feast logged</div></div>
    <div class="duo">
      <div class="cell"><div class="v num">${money(totalP).replace(".00", "")}</div><div class="k">total spent</div></div>
      <div class="cell"><div class="v num">${costPerLb(overall)}</div><div class="k">team rate</div></div>
    </div>
    <div class="quad">
      <div class="cell"><div class="v num">${orders.length}</div><div class="k">orders logged</div></div>
      <div class="cell"><div class="v num">${placesTried}</div><div class="k">places tried</div></div>
    </div>
    ${weeks.length > 1 ? `<h3 class="section-label">Pounds by week</h3><div class="chart">${chartSVG(weeks)}</div>` : ""}
    ${bestValue ? `<h3 class="section-label section-gap">Best value ${RANGE_PERIOD_LABEL[statsUI.range]}</h3><div>${placeCard(bestValue, 0)}</div>` : ""}
    ${topTags.length ? `<h3 class="section-label section-gap">Top cuisines</h3><div>${topTags.map(([t, w]) => tagBar(t, w, maxTag)).join("")}</div>` : ""}
    <h3 class="section-label section-gap">Who's feeding the team</h3>
    <div>${leaders.map((l) => `
      <div class="lead-row">
        <div class="ini">${esc(initials(l.name))}</div>
        <div class="body"><b>${esc(l.name)}</b><div class="sub">${l.n} order${l.n === 1 ? "" : "s"} · ${costPerLb(l.ratio)}</div></div>
        <div class="amt"><b class="num">${l.w.toFixed(1)}</b><span>lbs</span></div>
      </div>`).join("") || emptyBlock("No stats yet", "Log an order to see team totals.")}</div>`;

  main.querySelectorAll("[data-range]").forEach((b) => b.onclick = () => { statsUI.range = b.dataset.range; screenStats(); });
  main.querySelectorAll("[data-place]").forEach((n) => n.onclick = () => go("detail", { placeId: n.dataset.place }));
}

function screenProfile() {
  const agg = personAgg(currentUser, DATA);
  const rank = weightRankOf(currentUser, DATA);
  const ctx = { rank };
  const earnedCount = BADGES.filter((b) => evalBadge(b, agg, ctx).earned).length;

  const badgeTiles = BADGES.map((b) => {
    const r = evalBadge(b, agg, ctx);
    const cls = r.earned ? `earned ${b.tier}` : "locked";
    const track = (!r.earned && !b.rank) ? `<div class="btrack"><i style="width:${r.pct}%"></i></div>` : "";
    return `<div class="badge ${cls}" title="${esc(b.desc)}">
      <div class="ic">${b.icon}</div>
      <div class="bn">${esc(b.name)}</div>
      <div class="bs">${esc(r.sub)}</div>
      ${track}
    </div>`;
  }).join("");

  const picker = DATA.people.map((m) => {
    const sel = currentUser === m.name;
    const iniStyle = sel ? "" : `background:${m.accent || "var(--inset-2)"};color:#fff`;
    return `<button class="person ${sel ? "on" : ""}" data-person="${esc(m.name)}"><span class="ini" style="${iniStyle}">${esc(initials(m.name))}</span>${esc(m.name)}</button>`;
  }).join("");

  const createForm = profileUI.creating ? `
    <div class="create">
      <div class="field" style="margin-bottom:12px"><label>Profile name</label>
        <div class="input-wrap"><input class="control" id="pName" value="${esc(profileUI.newName)}" placeholder="Your name" maxlength="24" autocomplete="off"/></div></div>
      <label style="display:block;font-size:14px;font-weight:600;color:var(--ink-2)">Accent</label>
      <div class="swatches">${ACCENTS.map((c) => `<button class="swatch ${profileUI.newAccent === c ? "on" : ""}" data-accent="${c}" style="background:${c}" aria-label="accent"></button>`).join("")}</div>
      <div style="display:flex;gap:10px">
        <button class="btn" id="createBtn" style="flex:2">Create profile</button>
        <button class="btn ghost" id="cancelBtn" style="flex:1">Cancel</button>
      </div>
    </div>` : "";

  main.innerHTML = `
    <div class="app-head"><h1>Profile</h1></div>
    <div class="profile-head">
      <div class="big" style="background:${accentOf(currentUser)}">${esc(initials(currentUser))}</div>
      <h1>${esc(currentUser)}</h1>
      <p class="dim" style="font-size:13px">${agg.orderCount} order${agg.orderCount === 1 ? "" : "s"} · ${agg.totalW.toFixed(1)} lbs · ${money(agg.totalP).replace(".00", "")}</p>
    </div>

    <div class="row-between"><h3 style="margin:0">Badges</h3><span class="dim" style="font-size:12.5px;font-weight:600">${earnedCount} of ${BADGES.length}</span></div>
    <div class="badges">${badgeTiles}</div>

    <h3 class="section-label section-gap">Switch profile</h3>
    <div class="people">
      ${picker}
      <button class="person newp" id="newProfile"><span class="ini">+</span>New</button>
    </div>
    ${createForm}

    <div class="milestone section-gap">
      <div class="glyph">${I.scale}</div>
      <div class="body"><div class="row"><b>Data source</b><span class="amt">${DB.live ? "Supabase (shared)" : "Demo (local)"}</span></div>
      <p class="dim" style="font-size:12.5px;margin-top:4px">${DB.live ? "Everyone on the link sees the same profiles and data." : "Add your Supabase keys in config.js to share across the team."}</p></div>
    </div>`;

  main.querySelectorAll("[data-person]").forEach((b) => b.onclick = () => {
    currentUser = b.dataset.person; logState.person = currentUser; store.set("feast:user", currentUser);
    profileUI.creating = false; toast(`You're logging as ${currentUser}`); screenProfile(); renderTabbar();
  });
  const np = $("#newProfile", main); if (np) np.onclick = () => { profileUI.creating = true; screenProfile(); };
  const pName = $("#pName", main);
  if (pName) { pName.oninput = (e) => { profileUI.newName = e.target.value; }; pName.focus(); pName.setSelectionRange(pName.value.length, pName.value.length); }
  main.querySelectorAll("[data-accent]").forEach((s) => s.onclick = () => { profileUI.newAccent = s.dataset.accent; screenProfile(); });
  const cb = $("#cancelBtn", main); if (cb) cb.onclick = () => { profileUI.creating = false; profileUI.newName = ""; screenProfile(); };
  const create = $("#createBtn", main); if (create) create.onclick = createProfile;
}

async function createProfile() {
  const name = profileUI.newName.trim();
  if (!name) { toast("Enter a name first"); return; }
  if (DATA.people.some((p) => p.name.toLowerCase() === name.toLowerCase())) { toast("That name's already taken"); return; }
  const btn = $("#createBtn", main); btn.disabled = true; btn.textContent = "Creating…";
  try {
    await DB.addPerson({ name, accent: profileUI.newAccent });
    await refresh();
    currentUser = name; logState.person = name; store.set("feast:user", name);
    profileUI.creating = false; profileUI.newName = ""; profileUI.newAccent = ACCENTS[0];
    toast(`Welcome, ${name}`); screenProfile(); renderTabbar();
  } catch (e) {
    console.error(e); toast("Couldn't create profile — that name may be taken"); btn.disabled = false; btn.textContent = "Create profile";
  }
}

/* ── Shared bits ──────────────────────────────────────────────── */
function emptyBlock(title, body) {
  return `<div class="empty"><div class="glyph">${I.scale}</div><h3>${esc(title)}</h3><p>${esc(body)}</p></div>`;
}
function relTime(iso) {
  const d = Math.floor((Date.now() - new Date(iso)) / 864e5);
  if (d <= 0) return "today"; if (d === 1) return "yesterday";
  if (d < 7) return d + "d ago"; if (d < 30) return Math.floor(d / 7) + "w ago";
  return Math.floor(d / 30) + "mo ago";
}
function openLog() { logState.person = currentUser; go("log"); }

/* ── Router ───────────────────────────────────────────────────── */
function render() {
  const map = { home: screenHome, log: screenLog, library: screenLibrary, detail: screenDetail, stats: screenStats, profile: screenProfile };
  (map[view.name] || screenHome)();
  main.scrollTop = 0;
  tabbarEl.style.display = view.name === "log" || view.name === "detail" ? "none" : "flex";
  renderTabbar();
}

/* ── Boot ─────────────────────────────────────────────────────── */
(async function boot() {
  try {
    DB = isLive ? await makeSupabaseDB() : makeDemoDB();
    await refresh();
  } catch (e) {
    console.error("Falling back to demo data:", e);
    DB = makeDemoDB(); await refresh();
    toast("Couldn't reach the database — showing demo data");
  }
  const names = DATA.people.map((p) => p.name);
  const saved = store.get("feast:user");
  currentUser = (saved && names.includes(saved)) ? saved : (names[0] || currentUser);
  logState.person = currentUser;
  render();
})();

</script>
</body>
</html>
